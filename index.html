<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koleksi Dr. Pinguin Bokep, M.S.B.</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .video-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .video-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
    }
    .video-card iframe {
      transition: opacity 0.3s ease;
    }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-[1400px] mx-auto px-4 sm:px-6 py-8">
    <!-- Header -->
    <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4 mb-8">
      <div>
        <h1 class="text-4xl sm:text-5xl font-bold tracking-tight">Koleksi Dr. Pinguin Bokep, M.S.B.</h1>
        <p class="text-zinc-400 mt-2">IndoAV &amp; UserBokep • Update Harian</p>
      </div>
      <div class="bg-zinc-900 border border-zinc-800 rounded-2xl px-4 py-2 text-sm w-fit">
        <span id="total">0</span> video
      </div>
    </div>

    <!-- Controls -->
    <div class="flex flex-col lg:flex-row gap-4 mb-8">
      <!-- Search -->
      <div class="flex-1">
        <input id="search" type="text" placeholder="Cari judul video..." 
               class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl px-6 py-3.5 text-lg focus:outline-none focus:border-emerald-600">
      </div>

      <!-- Sort -->
      <div>
        <select id="sort" class="w-full lg:w-auto bg-zinc-900 border border-zinc-800 rounded-2xl px-4 py-3.5 text-white">
          <option value="newest">Terbaru</option>
          <option value="oldest">Terlama</option>
          <option value="az">A - Z</option>
          <option value="za">Z - A</option>
        </select>
      </div>
    </div>

    <!-- Category Filters -->
    <div id="category-filters" class="flex flex-wrap gap-2 mb-8"></div>

    <!-- Video Grid -->
    <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 2xl:grid-cols-7 gap-4 sm:gap-5"></div>

    <!-- Pagination -->
    <div class="flex flex-col sm:flex-row items-center justify-between mt-10 gap-4">
      <div class="text-sm text-zinc-400" id="pagination-info"></div>
      <div class="flex items-center gap-2 flex-wrap" id="pagination-controls"></div>
    </div>
  </div>

  <script>
    let videos = [];
    let activeCategory = 'all';
    let currentPage = 1;
    const itemsPerPage = 18;

    async function loadVideos() {
      const res = await fetch('videos.json');
      videos = await res.json();
      document.getElementById('total').textContent = videos.length;
      renderCategoryFilters();
      render();
    }

    function renderCategoryFilters() {
      const container = document.getElementById('category-filters');
      container.innerHTML = '';

      const categories = [...new Set(videos.map(v => v.category))].sort();

      const allBtn = createCategoryButton('Semua', 'all');
      container.appendChild(allBtn);

      categories.forEach(cat => {
        const btn = createCategoryButton(cat, cat);
        container.appendChild(btn);
      });
    }

    function createCategoryButton(label, value) {
      const btn = document.createElement('button');
      btn.textContent = label;
      btn.className = `px-4 sm:px-5 py-2 rounded-2xl text-sm font-medium border transition whitespace-nowrap ${activeCategory === value 
        ? 'bg-emerald-600 border-emerald-600 text-white' 
        : 'bg-zinc-900 border-zinc-700 hover:bg-zinc-800'}`;
      
      btn.onclick = () => {
        activeCategory = value;
        currentPage = 1;
        renderCategoryFilters();
        render();
      };
      return btn;
    }

    function render() {
      const grid = document.getElementById('grid');
      const searchTerm = document.getElementById('search').value.toLowerCase();
      const sortMode = document.getElementById('sort').value;

      let filtered = videos;

      if (searchTerm) {
        filtered = filtered.filter(v => v.title.toLowerCase().includes(searchTerm));
      }

      if (activeCategory !== 'all') {
        filtered = filtered.filter(v => v.category === activeCategory);
      }

      // Sort
      if (sortMode === 'newest') filtered.sort((a,b) => b.id - a.id);
      else if (sortMode === 'oldest') filtered.sort((a,b) => a.id - b.id);
      else if (sortMode === 'az') filtered.sort((a,b) => a.title.localeCompare(b.title));
      else if (sortMode === 'za') filtered.sort((a,b) => b.title.localeCompare(a.title));

      // Pagination
      const totalPages = Math.ceil(filtered.length / itemsPerPage);
      if (currentPage > totalPages) currentPage = totalPages || 1;

      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageVideos = filtered.slice(start, end);

      grid.innerHTML = '';

      if (pageVideos.length === 0) {
        grid.innerHTML = `<div class="col-span-full text-center py-20 text-zinc-400 text-lg">Tidak ada video yang cocok.</div>`;
        updatePagination(0, 0, 0, 0);
        return;
      }

      pageVideos.forEach(v => {
        const card = document.createElement('div');
        card.className = 'video-card bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden flex flex-col';

        card.innerHTML = `
          <div class="p-3 sm:p-4 flex-1">
            <div class="text-sm leading-snug text-zinc-200 line-clamp-3">${v.title}</div>
            <div class="text-[10px] text-emerald-400 mt-2 font-medium">${v.category} • ${v.source}</div>
          </div>
          
          <div class="relative aspect-video bg-black overflow-hidden">
            <iframe 
              src="${v.embed}" 
              class="absolute inset-0 w-full h-full" 
              allowfullscreen 
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
          </div>

          <div class="p-3 sm:p-4 mt-auto">
            <a href="${v.direct}" target="_blank" 
               class="block text-center py-3 bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 rounded-2xl text-sm font-semibold transition">
              Buka &amp; Tonton Langsung
            </a>
          </div>
        `;

        grid.appendChild(card);
      });

      updatePagination(filtered.length, start + 1, Math.min(end, filtered.length), totalPages);
    }

    function updatePagination(total, start, end, totalPages) {
      const info = document.getElementById('pagination-info');
      const controls = document.getElementById('pagination-controls');
      if (!info || !controls) return;

      controls.innerHTML = '';

      if (total === 0) {
        info.textContent = '';
        return;
      }

      info.textContent = `Menampilkan ${start}–${end} dari ${total} video`;

      if (totalPages <= 1) return;

      const wrapper = document.createElement('div');
      wrapper.className = 'flex items-center gap-1 flex-wrap justify-center';

      // Prev
      const prev = document.createElement('button');
      prev.innerHTML = `&larr;`;
      prev.className = `px-3 py-1.5 rounded-xl border border-zinc-700 text-sm ${currentPage === 1 ? 'opacity-40 cursor-not-allowed' : 'hover:bg-zinc-900 active:bg-zinc-800'}`;
      prev.disabled = currentPage === 1;
      prev.onclick = () => { currentPage--; render(); };
      wrapper.appendChild(prev);

      // Page numbers
      const max = 5;
      let startP = Math.max(1, currentPage - 2);
      let endP = Math.min(totalPages, startP + max - 1);

      for (let i = startP; i <= endP; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.className = `min-w-[36px] px-3 py-1.5 rounded-xl border text-sm font-medium ${i === currentPage 
          ? 'bg-emerald-600 border-emerald-600 text-white' 
          : 'border-zinc-700 hover:bg-zinc-900 active:bg-zinc-800'}`;
        btn.onclick = () => { currentPage = i; render(); };
        wrapper.appendChild(btn);
      }

      // Next
      const next = document.createElement('button');
      next.innerHTML = `&rarr;`;
      next.className = `px-3 py-1.5 rounded-xl border border-zinc-700 text-sm ${currentPage === totalPages ? 'opacity-40 cursor-not-allowed' : 'hover:bg-zinc-900 active:bg-zinc-800'}`;
      next.disabled = currentPage === totalPages;
      next.onclick = () => { currentPage++; render(); };
      wrapper.appendChild(next);

      controls.appendChild(wrapper);
    }

    document.getElementById('search').addEventListener('input', render);
    document.getElementById('sort').addEventListener('change', render);

    loadVideos();
  </script>
</body>
</html>
