<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koleksi Dr. Pinguin Bokep, M.S.B.</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex items-end justify-between mb-8">
      <div>
        <h1 class="text-5xl font-bold">Koleksi Dr. Pinguin Bokep, M.S.B.</h1>
        <p class="text-zinc-400 mt-2">IndoAV & UserBokep</p>
      </div>
      <div class="bg-zinc-900 border border-zinc-800 rounded-2xl px-4 py-2 text-sm">
        <span id="total">0</span> video
      </div>
    </div>

    <div class="flex gap-4 mb-8">
      <input id="search" type="text" placeholder="Cari judul..." class="flex-1 bg-zinc-900 border border-zinc-800 rounded-2xl px-6 py-3 text-lg">
      <select id="sort" class="bg-zinc-900 border border-zinc-800 rounded-2xl px-4 py-3">
        <option value="newest">Terbaru</option>
        <option value="oldest">Terlama</option>
      </select>
    </div>

    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-5"></div>
  </div>

  <script>
    let videos = [];

    async function loadVideos() {
      const res = await fetch('videos.json');
      videos = await res.json();
      document.getElementById('total').textContent = videos.length;
      render();
    }

    function render() {
      const grid = document.getElementById('grid');
      const search = document.getElementById('search').value.toLowerCase();
      const sort = document.getElementById('sort').value;

      let filtered = videos.filter(v => v.title.toLowerCase().includes(search));

      if (sort === 'newest') filtered.sort((a,b) => b.id - a.id);
      if (sort === 'oldest') filtered.sort((a,b) => a.id - b.id);

      grid.innerHTML = '';

      filtered.forEach(v => {
        const card = document.createElement('div');
        card.className = 'bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden';
        card.innerHTML = `
          <div class="p-4">
            <div class="text-sm text-zinc-200 line-clamp-3 min-h-[60px]">${v.title}</div>
            <div class="text-xs text-emerald-400 mt-2">${v.category} • ${v.source}</div>
          </div>
          <div class="aspect-video bg-black">
            <iframe src="${v.embed}" class="w-full h-full" allowfullscreen></iframe>
          </div>
          <div class="p-4">
            <a href="${v.direct}" target="_blank" class="block text-center py-3 bg-emerald-600 hover:bg-emerald-700 rounded-2xl text-sm font-semibold">Buka & Tonton Langsung</a>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    document.getElementById('search').addEventListener('input', render);
    document.getElementById('sort').addEventListener('change', render);

    loadVideos();
  </script>
</body>
</html>
