<!DOCTYPE html>
<html lang="id">
<head>
    <!-- Vercel Analytics -->
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dr. Pinguin Bokep, M.S.B.</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .logo-font { font-family: 'Poppins', system_ui, sans-serif; font-weight: 700; letter-spacing: -1px; }
        
        .video-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .video-card:hover {
            transform: translateY(-4px);
        }
        
        .video-wrapper {
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
            border-bottom: 1px solid #27272a;
        }
        .video-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <div class="max-w-7xl mx-auto px-4 py-6 md:px-8">
        
        <!-- Header with Logo -->
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4 pb-6 border-b border-zinc-800">
            <div class="flex items-center gap-x-4">
                <img src="logo.png" class="w-14 h-14 rounded-full border-2 border-yellow-400" alt="Dr. Pinguin"
                     onerror="this.src='https://i.postimg.cc/mrNxt4m5/6307559168587534411.jpg'">
                <div>
                    <div class="flex items-baseline gap-x-2">
                        <span class="logo-font text-3xl md:text-4xl font-black text-yellow-400">Dr. Pinguin</span>
                        <span class="logo-font text-3xl md:text-4xl font-black text-white">Bokep</span>
                    </div>
                    <div class="text-[10px] text-yellow-400/70 tracking-[2px] mt-1.5">M.S.B. • KOLEKSI PILIHAN</div>
                </div>
            </div>
            
            <div class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-2 text-sm flex items-center gap-2">
                <span id="total" class="font-bold text-yellow-400 text-xl">0</span>
                <span class="text-zinc-400 text-sm">video tersedia</span>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex flex-col lg:flex-row gap-3 mb-6">
            <!-- Search -->
            <div class="flex-1 relative">
                <i class="fas fa-search absolute left-5 top-4 text-zinc-500"></i>
                <input id="search" type="text" placeholder="Cari judul video..." 
                       class="w-full bg-zinc-900 border border-zinc-700 focus:border-yellow-400 rounded-3xl pl-12 pr-6 py-3.5 text-base outline-none">
            </div>
            
            <!-- Sort -->
            <select id="sort" class="bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-3.5 text-base">
                <option value="newest">Terbaru</option>
                <option value="oldest">Terlama</option>
                <option value="az">A - Z</option>
                <option value="za">Z - A</option>
            </select>
        </div>

        <!-- Category Filter -->
        <div class="mb-6 max-w-xs">
            <label class="block text-xs uppercase tracking-widest text-zinc-500 font-semibold mb-1.5 px-1">Kategori</label>
            <select id="category-select" class="w-full bg-zinc-900 border border-zinc-700 focus:border-yellow-400 rounded-3xl px-5 py-3 text-base outline-none">
                <!-- Options populated by JS -->
            </select>
        </div>

        <!-- Video Grid -->
        <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-3 xl:grid-cols-4 gap-4 md:gap-5"></div>

        <!-- Pagination -->
        <div class="flex flex-col sm:flex-row items-center justify-between mt-10 gap-4 text-sm text-zinc-400">
            <div id="pagination-info"></div>
            <div class="flex gap-2" id="pagination-controls"></div>
        </div>
    </div>

    <script>
        let videos = [];
        let activeCategory = 'all';
        let currentPage = 1;
        const perPage = 16;

        async function loadVideos() {
            try {
                const res = await fetch('videos.json');
                videos = await res.json();

                videos.forEach(v => {
                    if (v.title) v.title = v.title.replace(/^[\u25B6\uFE0F\s]*/, '').trim();
                });

                document.getElementById('total').textContent = videos.length;
                setupCategoryDropdown();
                render();
            } catch(err) {
                document.getElementById('grid').innerHTML = `
                    <div class="col-span-full py-12 text-center">
                        <p class="text-zinc-400">Gagal memuat videos.json</p>
                    </div>
                `;
            }
        }

        function setupCategoryDropdown() {
            const select = document.getElementById('category-select');
            if (!select) return;

            select.innerHTML = '';

            const categories = [...new Set(videos.map(v => v.category).filter(Boolean))].sort();

            const allOption = document.createElement('option');
            allOption.value = 'all';
            allOption.textContent = 'Semua Kategori';
            select.appendChild(allOption);

            categories.forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                select.appendChild(option);
            });

            select.addEventListener('change', () => {
                activeCategory = select.value;
                currentPage = 1;
                render();
            });
        }

        function render() {
            const grid = document.getElementById('grid');
            const searchTerm = document.getElementById('search').value.toLowerCase();
            const sortMode = document.getElementById('sort').value;

            let filtered = videos;

            if (activeCategory !== 'all') {
                filtered = filtered.filter(v => v.category === activeCategory);
            }

            if (searchTerm) {
                filtered = filtered.filter(v => 
                    (v.title && v.title.toLowerCase().includes(searchTerm)) || 
                    (v.category && v.category.toLowerCase().includes(searchTerm))
                );
            }

            // Sort
            if (sortMode === 'newest') {
                filtered.sort((a, b) => (b.id || 0) - (a.id || 0));
            } else if (sortMode === 'oldest') {
                filtered.sort((a, b) => (a.id || 0) - (b.id || 0));
            } else if (sortMode === 'az') {
                filtered.sort((a, b) => (a.title || '').localeCompare(b.title || ''));
            } else if (sortMode === 'za') {
                filtered.sort((a, b) => (b.title || '').localeCompare(a.title || ''));
            }

            // Pagination
            const totalPages = Math.ceil(filtered.length / perPage);
            const start = (currentPage - 1) * perPage;
            const pageVideos = filtered.slice(start, start + perPage);

            grid.innerHTML = '';

            if (pageVideos.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-12 text-center text-zinc-400">Tidak ada video ditemukan.</div>`;
                return;
            }

            pageVideos.forEach(video => {
                const card = document.createElement('div');
                card.className = 'video-card bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden';
                
                card.innerHTML = `
                    <div class="video-wrapper">
                        <iframe 
                            src="${video.embed}" 
                            allowfullscreen
                            loading="lazy"
                        ></iframe>
                    </div>
                    <div class="p-4">
                        <div class="flex items-start justify-between gap-2">
                            <h3 class="font-semibold text-sm leading-tight line-clamp-2">${video.title || 'Untitled'}</h3>
                        </div>
                        ${video.category ? `<div class="mt-2 inline-block px-2.5 py-0.5 text-[10px] rounded-full bg-zinc-800 text-zinc-400">${video.category}</div>` : ''}
                    </div>
                `;
                grid.appendChild(card);
            });

            // Update pagination info
            document.getElementById('pagination-info').innerHTML = 
                `Menampilkan <span class="font-medium text-white">${start + 1}-${Math.min(start + perPage, filtered.length)}</span> dari <span class="font-medium text-white">${filtered.length}</span> video`;

            // Pagination controls
            const controls = document.getElementById('pagination-controls');
            controls.innerHTML = '';

            if (totalPages > 1) {
                const prevBtn = document.createElement('button');
                prevBtn.className = `px-4 py-2 rounded-2xl border ${currentPage === 1 ? 'border-zinc-800 text-zinc-600 cursor-not-allowed' : 'border-zinc-700 hover:bg-zinc-900'}`;
                prevBtn.textContent = 'Sebelumnya';
                prevBtn.disabled = currentPage === 1;
                prevBtn.onclick = () => { currentPage--; render(); };
                controls.appendChild(prevBtn);

                const nextBtn = document.createElement('button');
                nextBtn.className = `px-4 py-2 rounded-2xl border ${currentPage === totalPages ? 'border-zinc-800 text-zinc-600 cursor-not-allowed' : 'border-zinc-700 hover:bg-zinc-900'}`;
                nextBtn.textContent = 'Selanjutnya';
                nextBtn.disabled = currentPage === totalPages;
                nextBtn.onclick = () => { currentPage++; render(); };
                controls.appendChild(nextBtn);
            }
        }

        // Event listeners
        document.getElementById('search').addEventListener('input', () => {
            currentPage = 1;
            render();
        });

        document.getElementById('sort').addEventListener('change', () => {
            currentPage = 1;
            render();
        });

        // Initial load
        loadVideos();
    </script>
</body>
</html>
