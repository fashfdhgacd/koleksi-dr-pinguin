<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koleksi Dr. Pinguin Bokep, M.S.B.</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .video-card {
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .video-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }
    .modal {
      animation: fadeInModal 0.2s ease forwards;
    }
    @keyframes fadeInModal {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-[1200px] mx-auto px-6 py-8">
    <!-- Header -->
    <div class="flex items-end justify-between mb-8">
      <div>
        <h1 class="text-5xl font-bold">Koleksi Dr. Pinguin Bokep, M.S.B.</h1>
        <p class="text-zinc-400 mt-2">IndoAV &amp; UserBokep</p>
      </div>
      <div class="flex items-center gap-3">
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl px-4 py-2 text-sm flex items-center gap-2">
          <span id="total">0</span> video
        </div>
        
        <!-- Random Controls -->
        <button id="random-btn"
                class="flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 transition px-5 py-2.5 rounded-2xl text-sm font-semibold shadow-lg">
          <span>🎲</span>
          <span>Acak Video</span>
        </button>
        
        <div class="flex items-center gap-2 bg-zinc-900 border border-zinc-800 rounded-2xl px-3 py-1 text-sm">
          <label class="flex items-center gap-2 cursor-pointer select-none">
            <input type="checkbox" id="auto-toggle" class="accent-emerald-600 w-4 h-4">
            <span class="text-zinc-300">Auto 5 menit</span>
          </label>
        </div>
      </div>
    </div>

    <!-- Search + Sort -->
    <div class="flex flex-col md:flex-row gap-4 mb-8">
      <input id="search" type="text" placeholder="Cari judul..." class="flex-1 bg-zinc-900 border border-zinc-800 rounded-2xl px-6 py-3 text-lg">
      <select id="sort" class="bg-zinc-900 border border-zinc-800 rounded-2xl px-4 py-3">
        <option value="newest">新最新</option>
        <option value="oldest">旧最旧</option>
        <option value="az">A - Z</option>
        <option value="za">Z - A</option>
        <option value="random">🎲 Acak / Shuffle</option>
      </select>
    </div>

    <!-- Category Filters -->
    <div id="category-filters" class="flex flex-wrap gap-2 mb-8"></div>

    <!-- Auto mode status -->
    <div id="auto-status" class="hidden mb-4 px-4 py-2 bg-emerald-950 border border-emerald-800 text-emerald-400 text-sm rounded-2xl flex items-center gap-2">
      <span class="animate-pulse">●</span>
      <span>Mode Acak Otomatis aktif — Video akan berganti setiap 5 menit</span>
      <button id="stop-auto-btn" class="ml-auto text-xs px-3 py-1 bg-emerald-900 hover:bg-emerald-800 rounded-xl">Matikan</button>
    </div>

    <!-- Video Grid (style seperti asli) -->
    <div id="grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    <!-- Pagination -->
    <div class="flex flex-col sm:flex-row items-center justify-between mt-10 gap-4">
      <div class="text-sm text-zinc-400" id="pagination-info"></div>
      <div class="flex items-center gap-2" id="pagination-controls"></div>
    </div>
  </div>

  <!-- Modal Player (untuk tombol Acak) -->
  <div id="modal" class="hidden fixed inset-0 bg-black/90 z-50 flex items-center justify-center p-4">
    <div class="bg-zinc-900 border border-zinc-800 rounded-3xl w-full max-w-5xl overflow-hidden modal">
      <div class="flex items-center justify-between px-6 py-4 border-b border-zinc-800">
        <div class="flex-1 min-w-0">
          <div id="modal-title" class="text-xl font-semibold line-clamp-2 pr-4"></div>
          <div id="modal-meta" class="text-xs text-emerald-400 mt-1"></div>
        </div>
        <button id="modal-close" class="text-zinc-400 hover:text-white text-3xl leading-none px-2">&times;</button>
      </div>

      <div class="aspect-video bg-black" id="modal-player-container"></div>

      <div class="p-6 flex flex-col sm:flex-row gap-3 bg-zinc-950">
        <button id="modal-random-again"
                class="flex-1 flex items-center justify-center gap-2 bg-emerald-600 hover:bg-emerald-700 transition px-6 py-3 rounded-2xl font-semibold">
          <span>🎲</span>
          <span>Acak Lagi</span>
        </button>
        
        <a id="modal-direct-btn" href="#" target="_blank"
           class="flex-1 flex items-center justify-center gap-2 bg-zinc-800 hover:bg-zinc-700 transition px-6 py-3 rounded-2xl font-semibold text-center">
          Buka Link Langsung
        </a>
        
        <button id="modal-close-btn"
                class="flex-1 sm:flex-none px-8 py-3 rounded-2xl border border-zinc-700 hover:bg-zinc-800 transition font-medium">
          Tutup
        </button>
      </div>
    </div>
  </div>

  <script>
    let videos = [];
    let activeCategory = 'all';
    let currentPage = 1;
    const itemsPerPage = 12;
    
    let autoTimer = null;
    let isAutoMode = false;
    let currentModalVideo = null;

    async function loadVideos() {
      const res = await fetch('videos.json');
      videos = await res.json();
      document.getElementById('total').textContent = videos.length;
      renderCategoryFilters();
      render();
    }

    function renderCategoryFilters() {
      const container = document.getElementById('category-filters');
      container.innerHTML = '';

      const categories = [...new Set(videos.map(v => v.category))].sort();

      const allBtn = createCategoryButton('Semua', 'all');
      container.appendChild(allBtn);

      categories.forEach(cat => {
        const btn = createCategoryButton(cat, cat);
        container.appendChild(btn);
      });
    }

    function createCategoryButton(label, value) {
      const btn = document.createElement('button');
      btn.textContent = label;
      btn.className = `px-5 py-2 rounded-2xl text-sm font-medium border transition ${activeCategory === value 
        ? 'bg-emerald-600 border-emerald-600 text-white' 
        : 'bg-zinc-900 border-zinc-700 hover:bg-zinc-800'}`;
      
      btn.onclick = () => {
        activeCategory = value;
        currentPage = 1;
        renderCategoryFilters();
        render();
      };
      return btn;
    }

    function render() {
      const grid = document.getElementById('grid');
      const searchTerm = document.getElementById('search').value.toLowerCase();
      const sortMode = document.getElementById('sort').value;

      let filtered = videos;

      if (searchTerm) {
        filtered = filtered.filter(v => v.title.toLowerCase().includes(searchTerm));
      }

      if (activeCategory !== 'all') {
        filtered = filtered.filter(v => v.category === activeCategory);
      }

      if (sortMode === 'newest') filtered.sort((a,b) => b.id - a.id);
      else if (sortMode === 'oldest') filtered.sort((a,b) => a.id - b.id);
      else if (sortMode === 'az') filtered.sort((a,b) => a.title.localeCompare(b.title));
      else if (sortMode === 'za') filtered.sort((a,b) => b.title.localeCompare(a.title));
      else if (sortMode === 'random') {
        for (let i = filtered.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
        }
      }

      const totalPages = Math.ceil(filtered.length / itemsPerPage);
      if (currentPage > totalPages) currentPage = totalPages || 1;

      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageVideos = filtered.slice(start, end);

      grid.innerHTML = '';

      if (pageVideos.length === 0) {
        grid.innerHTML = `<div class="col-span-full text-center py-16 text-zinc-400">Tidak ada video yang cocok.</div>`;
        updatePagination(0, 0, 0, 0);
        return;
      }

      pageVideos.forEach(v => {
        const card = document.createElement('div');
        card.className = 'video-card bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden';

        // KEMBALI KE STYLE ASLI: iframe langsung di dalam card
        card.innerHTML = `
          <div class="p-4">
            <div class="text-sm text-zinc-200 line-clamp-3 min-h-[60px]">${v.title}</div>
            <div class="text-xs text-emerald-400 mt-2">${v.category} • ${v.source}</div>
          </div>
          <div class="aspect-video bg-black">
            <iframe src="${v.embed}" class="w-full h-full" allowfullscreen loading="lazy"></iframe>
          </div>
          <div class="p-4">
            <a href="${v.direct}" target="_blank" class="block text-center py-3 bg-emerald-600 hover:bg-emerald-700 rounded-2xl text-sm font-semibold">Buka &amp; Tonton Langsung</a>
          </div>
        `;
        grid.appendChild(card);
      });

      updatePagination(filtered.length, start + 1, Math.min(end, filtered.length), totalPages);
    }

    function updatePagination(total, start, end, totalPages) {
      const info = document.getElementById('pagination-info');
      const controls = document.getElementById('pagination-controls');
      controls.innerHTML = '';

      if (total === 0) {
        info.textContent = '';
        return;
      }

      info.textContent = `Menampilkan ${start}–${end} dari ${total} video (Hal ${currentPage}/${totalPages})`;

      if (totalPages <= 1) return;

      const prev = document.createElement('button');
      prev.innerHTML = `&larr; Prev`;
      prev.className = `px-4 py-2 rounded-2xl border border-zinc-700 text-sm ${currentPage === 1 ? 'opacity-40 cursor-not-allowed' : 'hover:bg-zinc-900'}`;
      prev.disabled = currentPage === 1;
      prev.onclick = () => { currentPage--; render(); };
      controls.appendChild(prev);

      const max = 5;
      let startP = Math.max(1, currentPage - 2);
      let endP = Math.min(totalPages, startP + max - 1);

      for (let i = startP; i <= endP; i++) {
        const btn = document.createElement('button');
        btn.textContent = i;
        btn.className = `px-4 py-2 rounded-2xl border text-sm ${i === currentPage ? 'bg-emerald-600 border-emerald-600 text-white' : 'border-zinc-700 hover:bg-zinc-900'}`;
        btn.onclick = () => { currentPage = i; render(); };
        controls.appendChild(btn);
      }

      const next = document.createElement('button');
      next.innerHTML = `Next &rarr;`;
      next.className = `px-4 py-2 rounded-2xl border border-zinc-700 text-sm ${currentPage === totalPages ? 'opacity-40 cursor-not-allowed' : 'hover:bg-zinc-900'}`;
      next.disabled = currentPage === totalPages;
      next.onclick = () => { currentPage++; render(); };
      controls.appendChild(next);
    }

    // ==================== RANDOM + MODAL ====================

    function pickRandomVideo() {
      if (!videos.length) return null;
      const randomIndex = Math.floor(Math.random() * videos.length);
      return videos[randomIndex];
    }

    function openVideoModal(video) {
      const modal = document.getElementById('modal');
      const playerContainer = document.getElementById('modal-player-container');
      const titleEl = document.getElementById('modal-title');
      const metaEl = document.getElementById('modal-meta');
      const directBtn = document.getElementById('modal-direct-btn');

      currentModalVideo = video;

      titleEl.textContent = video.title;
      metaEl.textContent = `${video.category} • ${video.source} • ID: ${video.id}`;
      directBtn.href = video.direct;

      playerContainer.innerHTML = `
        <iframe src="${video.embed}" class="w-full h-full" allowfullscreen style="border: none;"></iframe>
      `;

      modal.classList.remove('hidden');
      modal.classList.add('flex');
    }

    function closeVideoModal() {
      const modal = document.getElementById('modal');
      const playerContainer = document.getElementById('modal-player-container');
      
      modal.classList.remove('flex');
      modal.classList.add('hidden');
      playerContainer.innerHTML = '';
      currentModalVideo = null;
    }

    function updateModalWithNewVideo(video) {
      if (!video) return;
      const playerContainer = document.getElementById('modal-player-container');
      const titleEl = document.getElementById('modal-title');
      const metaEl = document.getElementById('modal-meta');
      const directBtn = document.getElementById('modal-direct-btn');

      currentModalVideo = video;
      titleEl.textContent = video.title;
      metaEl.textContent = `${video.category} • ${video.source} • ID: ${video.id}`;
      directBtn.href = video.direct;

      playerContainer.innerHTML = `
        <iframe src="${video.embed}" class="w-full h-full" allowfullscreen style="border: none;"></iframe>
      `;
    }

    function triggerRandom() {
      const randomVideo = pickRandomVideo();
      if (randomVideo) {
        openVideoModal(randomVideo);
      }
    }

    function startAutoMode() {
      isAutoMode = true;
      document.getElementById('auto-toggle').checked = true;
      document.getElementById('auto-status').classList.remove('hidden');
      document.getElementById('auto-status').classList.add('flex');

      if (!currentModalVideo) {
        const first = pickRandomVideo();
        if (first) openVideoModal(first);
      }

      if (autoTimer) clearInterval(autoTimer);

      autoTimer = setInterval(() => {
        if (isAutoMode && currentModalVideo) {
          const modal = document.getElementById('modal');
          if (!modal.classList.contains('hidden')) {
            const newVid = pickRandomVideo();
            if (newVid) updateModalWithNewVideo(newVid);
          }
        }
      }, 5 * 60 * 1000);
    }

    function stopAutoMode() {
      isAutoMode = false;
      document.getElementById('auto-toggle').checked = false;
      document.getElementById('auto-status').classList.remove('flex');
      document.getElementById('auto-status').classList.add('hidden');

      if (autoTimer) {
        clearInterval(autoTimer);
        autoTimer = null;
      }
    }

    // Event Listeners
    document.getElementById('search').addEventListener('input', render);
    document.getElementById('sort').addEventListener('change', render);

    document.getElementById('random-btn').addEventListener('click', triggerRandom);
    document.getElementById('auto-toggle').addEventListener('change', (e) => {
      if (e.target.checked) startAutoMode();
      else stopAutoMode();
    });
    document.getElementById('stop-auto-btn').addEventListener('click', stopAutoMode);

    document.getElementById('modal-close').addEventListener('click', closeVideoModal);
    document.getElementById('modal-close-btn').addEventListener('click', closeVideoModal);
    document.getElementById('modal').addEventListener('click', (e) => {
      if (e.target.id === 'modal') closeVideoModal();
    });

    document.getElementById('modal-random-again').addEventListener('click', () => {
      const newVid = pickRandomVideo();
      if (newVid) updateModalWithNewVideo(newVid);
    });

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'r' && document.activeElement.tagName === 'BODY') {
        e.preventDefault();
        triggerRandom();
      }
      if (e.key === 'Escape') {
        const modal = document.getElementById('modal');
        if (!modal.classList.contains('hidden')) closeVideoModal();
      }
    });

    loadVideos();
  </script>
</body>
</html>
