<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Koleksi Dr. Pinguin Bokep, M.S.B.</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://va.vercel-scripts.com/v1/script.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    .video-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .video-card:hover {
      transform: translateY(-8px) scale(1.03);
    }
    .thumbnail {
      aspect-ratio: 16 / 9;
      background: #111;
    }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-7xl mx-auto px-4 py-6 md:px-8 md:py-10">
    <!-- Header -->
    <div class="flex flex-col md:flex-row md:items-end justify-between mb-8 gap-4">
      <div>
        <h1 class="text-4xl md:text-5xl font-bold">🐧 Koleksi Dr. Pinguin Bokep, M.S.B.</h1>
        <p class="text-zinc-400 mt-1">IndoAV & UserBokep Collection</p>
      </div>
      <div class="bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3 text-sm flex items-center gap-3">
        <span id="total" class="font-semibold">0</span> video
      </div>
    </div>

    <!-- Search & Sort -->
    <div class="flex flex-col md:flex-row gap-4 mb-8">
      <input id="search" type="text" placeholder="Cari judul video..." 
             class="flex-1 bg-zinc-900 border border-zinc-700 focus:border-emerald-500 rounded-3xl px-6 py-4 text-base md:text-lg outline-none">
      <select id="sort" class="bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-4 text-base">
        <option value="newest">Terbaru</option>
        <option value="oldest">Terlama</option>
        <option value="az">A - Z</option>
        <option value="za">Z - A</option>
      </select>
    </div>

    <!-- Category Filters -->
    <div id="category-filters" class="flex flex-wrap gap-2 mb-8"></div>

    <!-- Grid -->
    <div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6"></div>

    <!-- Pagination -->
    <div class="flex flex-col sm:flex-row items-center justify-between mt-12 gap-4 text-sm text-zinc-400" id="pagination-info"></div>
    <div class="flex justify-center gap-2 mt-6" id="pagination-controls"></div>
  </div>

  <!-- Modal -->
  <div id="modal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-2 md:p-8">
    <div class="w-full max-w-5xl bg-zinc-900 rounded-3xl overflow-hidden" onclick="event.stopImmediatePropagation()">
      <div class="flex justify-between items-center p-6 border-b border-zinc-700">
        <h2 id="modal-title" class="text-lg md:text-2xl font-semibold line-clamp-2 pr-4"></h2>
        <button onclick="closeModal()" class="text-4xl text-zinc-400 hover:text-white">×</button>
      </div>
      <div id="player" class="aspect-video bg-black"></div>
    </div>
  </div>

  <script>
    let videos = [];
    let activeCategory = 'all';
    let currentPage = 1;
    const itemsPerPage = 18;

    async function loadVideos() {
      const res = await fetch('videos.json');
      videos = await res.json();
      document.getElementById('total').textContent = videos.length;
      renderCategoryFilters();
      render();
    }

    function renderCategoryFilters() {
      const container = document.getElementById('category-filters');
      container.innerHTML = '';
      const categories = [...new Set(videos.map(v => v.category))].sort();

      const allBtn = createCategoryButton('Semua', 'all');
      container.appendChild(allBtn);

      categories.forEach(cat => {
        container.appendChild(createCategoryButton(cat, cat));
      });
    }

    function createCategoryButton(label, value) {
      const btn = document.createElement('button');
      btn.textContent = label;
      btn.className = `px-5 py-2 rounded-3xl text-sm font-medium border transition-all ${activeCategory === value ? 'bg-emerald-600 border-emerald-600 text-white' : 'bg-zinc-900 border-zinc-700 hover:bg-zinc-800'}`;
      btn.onclick = () => {
        activeCategory = value;
        currentPage = 1;
        renderCategoryFilters();
        render();
      };
      return btn;
    }

    function render() {
      const grid = document.getElementById('grid');
      const searchTerm = document.getElementById('search').value.toLowerCase().trim();
      const sortMode = document.getElementById('sort').value;

      let filtered = videos.filter(v => {
        const matchSearch = !searchTerm || v.title.toLowerCase().includes(searchTerm);
        const matchCat = activeCategory === 'all' || v.category === activeCategory;
        return matchSearch && matchCat;
      });

      if (sortMode === 'newest') filtered.sort((a,b) => b.id - a.id);
      else if (sortMode === 'oldest') filtered.sort((a,b) => a.id - b.id);
      else if (sortMode === 'az') filtered.sort((a,b) => a.title.localeCompare(b.title));
      else if (sortMode === 'za') filtered.sort((a,b) => b.title.localeCompare(a.title));

      const totalPages = Math.ceil(filtered.length / itemsPerPage);
      if (currentPage > totalPages) currentPage = 1;

      const start = (currentPage - 1) * itemsPerPage;
      const pageVideos = filtered.slice(start, start + itemsPerPage);

      grid.innerHTML = pageVideos.map(v => `
        <div onclick="playVideo(${v.id})" class="video-card bg-zinc-900 border border-zinc-800 rounded-3xl overflow-hidden cursor-pointer group">
          <div class="thumbnail relative">
            <img src="https://picsum.photos/id/${(v.id % 200) + 10}/640/360" class="w-full h-full object-cover group-hover:scale-105 transition" alt="">
            <div class="absolute inset-0 flex items-center justify-center bg-black/40 opacity-0 group-hover:opacity-100 transition">
              <i class="fas fa-play text-5xl text-white drop-shadow"></i>
            </div>
          </div>
          <div class="p-4">
            <div class="text-sm md:text-base line-clamp-2 font-medium leading-tight min-h-[42px]">${v.title}</div>
            <div class="text-xs text-emerald-400 mt-3">${v.category} • ${v.source}</div>
          </div>
        </div>
      `).join('');

      updatePagination(filtered.length, totalPages);
    }

    window.playVideo = function(id) {
      const video = videos.find(v => v.id === id);
      if (!video) return;

      document.getElementById('modal-title').textContent = video.title;
      document.getElementById('player').innerHTML = `
        <iframe src="${video.embed}" width="100%" height="100%" frameborder="0" allowfullscreen allow="autoplay; fullscreen"></iframe>
      `;
      document.getElementById('modal').classList.remove('hidden');
      document.getElementById('modal').classList.add('flex');
    };

    window.closeModal = function() {
      const modal = document.getElementById('modal');
      modal.classList.add('hidden');
      modal.classList.remove('flex');
      document.getElementById('player').innerHTML = '';
    };

    function updatePagination(total, totalPages) {
      // Simplified pagination - add full if needed
      const info = document.getElementById('pagination-info');
      info.textContent = `Menampilkan ${total} video`;
    }

    document.getElementById('search').addEventListener('input', () => { currentPage = 1; render(); });
    document.getElementById('sort').addEventListener('change', () => { currentPage = 1; render(); });

    loadVideos();
  </script>
</body>
</html>
